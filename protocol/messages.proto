syntax = "proto3";

package protocol;

option go_package = "slg-game/protocol";

// 消息头
message Header {
    uint32 magic = 1;
    uint32 version = 2;
    uint32 seq_id = 3;
    uint32 msg_id = 4;
}

// C2S 消息
message C2S_LoginRequest {
    string username = 1;
    string password = 2;
}

message C2S_RegisterRequest {
    string username = 1;
    string password = 2;
    string email = 3;
}

message C2S_MoveRequest {
    int32 x = 1;
    int32 y = 2;
}

message C2S_BuildRequest {
    string building_type = 1;
    int32 x = 2;
    int32 y = 3;
}

// S2C 消息
message S2C_LoginResponse {
    bool success = 1;
    string message = 2;
    uint64 player_id = 3;
    PlayerData player_data = 4;
}

message S2C_RegisterResponse {
    bool success = 1;
    string message = 2;
    uint64 player_id = 3;
}

message S2C_MoveResponse {
    bool success = 1;
    string message = 2;
    int32 x = 3;
    int32 y = 4;
}

message S2C_BuildResponse {
    bool success = 1;
    string message = 2;
    Building building = 3;
}

// 数据结构
message PlayerData {
    uint64 player_id = 1;
    string username = 2;
    string email = 3;
    int32 level = 4;
    int64 experience = 5;
    int32 x = 6;
    int32 y = 7;
    map<string, int64> resources = 8;
    repeated Building buildings = 9;
    int64 created_at = 15;
    int64 last_login = 16;
}

message Building {
    uint64 building_id = 1;
    string building_type = 2;
    int32 level = 3;
    int32 x = 4;
    int32 y = 5;
}

// 错误响应
message ErrorResponse {
    int32 code = 1;
    string message = 2;
    string detail = 3;
}
