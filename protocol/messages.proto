syntax = "proto3";

package protocol;

option go_package = "slg-game/protocol";

// C2S 消息
message C2S_LoginRequest {
    string username = 1;
    string password = 2;
}

message C2S_RegisterRequest {
    string username = 1;
    string password = 2;
    string email = 3;
}

message C2S_MoveRequest {
    int32 x = 1;
    int32 y = 2;
}

message C2S_BuildRequest {
    string building_type = 1;
    int32 x = 2;
    int32 y = 3;
}

message C2S_WhoRequest {
    // 获取视野内玩家，无需参数
}

// S2C 消息
message S2C_LoginResponse {
    bool success = 1;
    string message = 2;
    uint64 player_id = 3;
    PlayerData player_data = 4;
}

message S2C_RegisterResponse {
    bool success = 1;
    string message = 2;
    uint64 player_id = 3;
}

message S2C_MoveResponse {
    bool success = 1;
    string message = 2;
    int32 x = 3;
    int32 y = 4;
}

message S2C_BuildResponse {
    bool success = 1;
    string message = 2;
    Building building = 3;
}

message S2C_WhoResponse {
    bool success = 1;
    string message = 2;
    repeated WhoPlayerInfo players = 3;
}

// 数据结构
message PlayerData {
    uint64 player_id = 1;
    string username = 2;
    string email = 3;
    int32 level = 4;
    int64 experience = 5;
    int32 x = 6;
    int32 y = 7;
    map<string, int64> resources = 8;
    repeated Building buildings = 9;
    int64 created_at = 15;
    int64 last_login = 16;
}

message Building {
    uint64 building_id = 1;
    string building_type = 2;
    int32 level = 3;
    int32 x = 4;
    int32 y = 5;
}

message WhoPlayerInfo {
    uint64 player_id = 1;
    string username = 2;
    int32 x = 3;
    int32 y = 4;
}

// 视野同步通知
message PlayerEnterNotification {
    uint64 player_id = 1;
    int32 x = 2;
    int32 y = 3;
}

message PlayerLeaveNotification {
    uint64 player_id = 1;
}

message PlayerMoveNotification {
    uint64 player_id = 1;
    int32 x = 2;
    int32 y = 3;
}
